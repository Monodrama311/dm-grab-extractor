services:
  - type: web
    name: dm-grab-extractor
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && pip install --upgrade yt-dlp"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
    envVars:
      - key: INTERNAL_TOKEN
        sync: false
